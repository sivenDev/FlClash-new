name: build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      target:
        description: Build target set
        required: true
        default: macos
        type: choice
        options:
          - macos
          - all
env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include: ${{ fromJSON(github.event_name == 'workflow_dispatch' && inputs.target == 'macos' && '[{"platform":"macos","os":"macos-15-intel","arch":"amd64"},{"platform":"macos","os":"macos-latest","arch":"arm64"}]' || '[{"platform":"android","os":"ubuntu-latest"},{"platform":"windows","os":"Windows-2022","arch":"amd64"},{"platform":"linux","os":"ubuntu-22.04","arch":"amd64"},{"platform":"macos","os":"macos-15-intel","arch":"amd64"},{"platform":"macos","os":"macos-latest","arch":"arm64"},{"platform":"linux","os":"ubuntu-24.04-arm","arch":"arm64"}]') }}

    steps:
      - name: Setup rust
        if: startsWith(matrix.os, 'windows-11-arm')
        run: |
          Invoke-WebRequest -Uri "https://win.rustup.rs/aarch64" -OutFile rustup-init.exe
          .\rustup-init.exe -y --default-toolchain stable
          $cargoPath = "$env:USERPROFILE\.cargo\bin"
          Add-Content $env:GITHUB_PATH $cargoPath

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android Signing
        if: startsWith(matrix.platform,'android')
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE }}
          SERVICE_JSON_RAW: ${{ secrets.SERVICE_JSON }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${SERVICE_JSON_RAW:-}" ]; then
            echo "SERVICE_JSON secret is missing." >&2
            exit 1
          fi

          if [ -n "${KEYSTORE_B64:-}" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > android/app/keystore.jks
          fi

          # Accept both base64-encoded and plain JSON secret content.
          if echo "$SERVICE_JSON_RAW" | base64 --decode > android/app/google-services.json 2>/dev/null; then
            echo "google-services.json decoded from base64."
          else
            printf '%s' "$SERVICE_JSON_RAW" > android/app/google-services.json
            echo "google-services.json written from raw JSON."
          fi

          # Fail fast with a clear message if JSON is invalid.
          python -m json.tool android/app/google-services.json >/dev/null

          if [ -n "${KEY_ALIAS:-}" ]; then
            echo "keyAlias=$KEY_ALIAS" >> android/local.properties
          fi
          if [ -n "${STORE_PASSWORD:-}" ]; then
            echo "storePassword=$STORE_PASSWORD" >> android/local.properties
          fi
          if [ -n "${KEY_PASSWORD:-}" ]; then
            echo "keyPassword=$KEY_PASSWORD" >> android/local.properties
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            core/go.sum

      - name: Setup Flutter
        if: ${{ !(startsWith(matrix.os, 'windows-11-arm') || startsWith(matrix.os, 'ubuntu-24.04-arm')) }}
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true
      - name: Setup Flutter With Other
        if: startsWith(matrix.os, 'windows-11-arm') || startsWith(matrix.os, 'ubuntu-24.04-arm')
        uses: subosito/flutter-action@v2
        with:
          channel: master
          flutter-version: 3.35.7
          cache: true

      - name: Get Flutter Dependency
        run: |
          flutter --version
          flutter pub get

      - name: Setup
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: dart setup.dart ${{ matrix.platform }} ${{ matrix.arch && format('--arch {0}', matrix.arch) }} ${{ env.IS_STABLE == 'true' && '--env stable' || '' }}

      - name: Ensure Android split APK artifacts
        if: startsWith(matrix.platform, 'android')
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist

          if ls dist/*android-arm64-v8a.apk dist/*android-armeabi-v7a.apk dist/*android-x86_64.apk >/dev/null 2>&1; then
            echo "Split APK artifacts already exist in dist."
            exit 0
          fi

          echo "Split APK artifacts missing. Build split-per-abi APKs as fallback."
          flutter build apk --release --split-per-abi --dart-define-from-file=env.json

          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "dist/FlClash-${version}-android-arm64-v8a.apk"
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk "dist/FlClash-${version}-android-armeabi-v7a.apk"
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk "dist/FlClash-${version}-android-x86_64.apk"

      - name: Fallback collect Android artifacts
        if: startsWith(matrix.platform, 'android')
        shell: pwsh
        run: |
          $distPath = "./dist"
          $distFiles = @()
          if (Test-Path $distPath) {
            $distFiles = Get-ChildItem $distPath -Recurse -File
          }

          if ($distFiles.Count -gt 0) {
            Write-Host "dist already has files, skip fallback collection."
            exit 0
          }

          $apkDir = "./build/app/outputs/flutter-apk"
          if (!(Test-Path $apkDir)) {
            Write-Host "No fallback apk directory found: $apkDir"
            exit 0
          }

          $apkFiles = Get-ChildItem $apkDir -Filter "*.apk" -File
          if ($apkFiles.Count -eq 0) {
            Write-Host "No apk files found in fallback directory."
            exit 0
          }

          New-Item -ItemType Directory -Force -Path $distPath | Out-Null
          foreach ($apk in $apkFiles) {
            Copy-Item $apk.FullName -Destination $distPath -Force
            Write-Host "Copied fallback artifact: $($apk.FullName)"
          }

      - name: Verify dist artifacts
        shell: pwsh
        run: |
          Write-Host "Workspace: $pwd"
          if (!(Test-Path "./dist")) {
            Write-Error "dist directory not found after setup.dart build."
            exit 1
          }

          $files = Get-ChildItem "./dist" -Recurse -File
          if ($files.Count -eq 0) {
            Write-Error "dist directory exists but contains no files."
            exit 1
          }

          Write-Host "dist file count: $($files.Count)"
          $files | Select-Object -First 200 | ForEach-Object { Write-Host $_.FullName }

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) }}
          path: ./dist
          if-no-files-found: error
          overwrite: true

  changelog:
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    needs: [ build ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        if: ${{ env.IS_STABLE == 'true' }}
        with:
          fetch-depth: 0
          ref: refs/heads/main
      - name: Generate
        if: ${{ env.IS_STABLE == 'true' }}
        run: |
          last_ver=$(grep -m1 '^## ' CHANGELOG.md 2>/dev/null | sed 's/^## //')
          
          tags=($(git tag --merged HEAD --sort=-creatordate))
          
          temp="NEW_CHANGELOG.md" > "$temp"
          
          for i in "${!tags[@]}"; do
              curr="${tags[i]}"
              [[ "$curr" == "$last_ver" ]] && break
          
              prev="${tags[i+1]}"
              range="${prev:+$prev..}$curr"
          
              echo -e "## $curr\n" >> "$temp"
              git log --no-merges --pretty=format:"%s" "$range" | \
              awk '!/Update changelog/ && !/Co-authored-by:/ && !/cursoragent@cursor.com/ && NF {print "- " $0 "\n"}' >> "$temp"
          done
          [ -f CHANGELOG.md ] && cat CHANGELOG.md >> "$temp"
          
          mv "$temp" CHANGELOG.md

      - name: Commit
        if: ${{ env.IS_STABLE == 'true' }}
        run: |
          git add CHANGELOG.md
          if ! git diff --cached --quiet; then
            echo "Commit pushing"
            git config --local user.email "chen08209@gmail.com"
            git config --local user.name "chen08209"
            git commit -m "Update changelog"
            git push
            if [ $? -eq 0 ]; then
              echo "Push succeeded"
            else
              echo "Push failed"
              exit 1
            fi
          fi

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload:
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    permissions: write-all
    needs: [ build ]
    runs-on: ubuntu-latest
    # services:
    #   telegram-bot-api:
    #     image: aiogram/telegram-bot-api:latest
    #     env:
    #       TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
    #       TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
    #     ports:
    #       - 8081:8081
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          pattern: artifact-*
          merge-multiple: true

      - name: Generate release.md
        run: |
          currentTag="${{ github.ref_name }}"
          preTag=$(git tag --merged "$currentTag" --sort=-v:refname | sed -n '2p')
          out="release.md"
          : > "$out"

          range="$currentTag"
          if [ -n "$preTag" ]; then
            range="$preTag..$currentTag"
          fi

          git log --first-parent --no-merges --pretty=format:"%s" "$range" | \
            awk '!/Update changelog/ && !/Co-authored-by:/ && !/cursoragent@cursor.com/ && NF {print "- " $0}' >> "$out"

          if [ ! -s "$out" ]; then
            echo "- Maintenance release." >> "$out"
          fi

      - name: Normalize artifact filenames by tag version
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          shopt -s nullglob
          for file in ./dist/FlClash-*; do
            base="$(basename "$file")"
            normalized="$(echo "$base" | sed -E "s/^FlClash-[0-9]+(\.[0-9]+){1,3}/FlClash-${version}/")"
            if [ "$base" != "$normalized" ]; then
              rm -f "./dist/${normalized}"
              mv "$file" "./dist/${normalized}"
              echo "Renamed ${base} -> ${normalized}"
            fi
          done
      # - name: Push to telegram
      #   continue-on-error: true
      #   env:
      #     TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      #     TAG: ${{ github.ref_name }}
      #     RUN_ID: ${{ github.run_id }}
      #   run: |
      #     python -m pip install --upgrade pip
      #     pip install requests
      #     python release_telegram.py

      - name: Patch release.md
        run: |
          version=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          sed -e "s|VERSION|$version|g" -e "s|REPO|${GITHUB_REPOSITORY}|g" ./.github/release_template.md >> release.md

      - name: Generate sha256
        if: env.IS_STABLE == 'true'
        run: |
          cd ./dist
          for file in $(find . -type f -not -name "*.sha256"); do
            sha256sum "$file" > "${file}.sha256"
          done  

      - name: Release
        if: ${{ env.IS_STABLE == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*
          body_path: './release.md'

      - name: Create Fdroid Source Dir
        if: ${{ env.IS_STABLE == 'true' }}
        run: |
          mkdir -p ./tmp
          cp ./dist/*android-arm64-v8a* ./tmp/ || true
          echo "Files copied successfully"

